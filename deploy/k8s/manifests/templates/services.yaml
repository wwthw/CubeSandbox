apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: cube-system
  labels:
    helm.sh/chart: cubesandbox-1.0.0
    app.kubernetes.io/name: cubesandbox
    app.kubernetes.io/instance: cubesandbox
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    component: mysql
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    component: mysql
