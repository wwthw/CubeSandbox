---
# Source: cubesandbox/templates/statefulset-mysql.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: cube-system
  labels:
    helm.sh/chart: cubesandbox-1.0.0
    app.kubernetes.io/name: cubesandbox
    app.kubernetes.io/instance: cubesandbox
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    component: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      component: mysql
  template:
    metadata:
      labels:
        helm.sh/chart: cubesandbox-1.0.0
        app.kubernetes.io/name: cubesandbox
        app.kubernetes.io/instance: cubesandbox
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        component: mysql
    spec:
      serviceAccountName: cubesandbox
      containers:
        - name: mysql
          image: "mysql:8.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cubesandbox-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: cube_mvp
            - name: MYSQL_USER
              value: cube
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cubesandbox-secret
                  key: mysql-password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: cubesandbox-mysql
---
# Source: cubesandbox/templates/statefulset-redis.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: cube-system
  labels:
    helm.sh/chart: cubesandbox-1.0.0
    app.kubernetes.io/name: cubesandbox
    app.kubernetes.io/instance: cubesandbox
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    component: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      component: redis
  template:
    metadata:
      labels:
        helm.sh/chart: cubesandbox-1.0.0
        app.kubernetes.io/name: cubesandbox
        app.kubernetes.io/instance: cubesandbox
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        component: redis
    spec:
      serviceAccountName: cubesandbox
      containers:
        - name: redis
          image: "redis:7.2-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --requirepass
            - "$(REDIS_PASSWORD)"
            - --appendonly
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cubesandbox-secret
                  key: redis-password
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: cubesandbox-redis